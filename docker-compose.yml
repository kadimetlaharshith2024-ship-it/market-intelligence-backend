services:
  app:
    build: .
    container_name: market-intelligence-app
    ports:
      - "8082:8082"
    depends_on:
      - db
      - redis
    environment:
  PORT: ${PORT}

  DB_URL: ${DB_URL}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}

  OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
  NEWS_API_KEY: ${NEWS_API_KEY}
  FMP_API_KEY: ${FMP_API_KEY}
  METAL_API_KEY: ${METAL_API_KEY}

    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: market-intelligence-db
    environment:
      POSTGRES_DB: market_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: market-intelligence-cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: